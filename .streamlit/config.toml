[server]
headless = true

[browser]
gatherUsageStats = false

# Default = dark. Sidebar "Light" still uses this file for Streamlit tokens; ui_theme.py overrides text colors for readability.
[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0c1118"
secondaryBackgroundColor = "#0f1419"
textColor = "#e5e7eb"
font = "sans serif"
